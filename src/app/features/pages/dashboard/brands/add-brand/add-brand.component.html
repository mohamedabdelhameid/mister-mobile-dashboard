<div
  class="min-h-screen bg-[#0a0a0a] text-white font-['Tajawal',sans-serif] flex items-center justify-center py-16 px-4"
  dir="rtl"
>
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div
      class="absolute top-[-10%] right-[10%] w-[600px] h-[600px] rounded-full"
      style="background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, transparent 70%)"
    ></div>
  </div>

  <div class="relative z-10 w-full max-w-lg">
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-gradient-to-l from-[#D4AF37]/30 to-transparent"></div>
      <span class="text-xs tracking-[0.3em] uppercase text-[#D4AF37] opacity-60"
        >LUXA Dashboard</span
      >
      <div class="flex-1 h-px bg-gradient-to-r from-[#D4AF37]/30 to-transparent"></div>
    </div>

    <div class="mb-8">
      <h1 class="text-3xl font-black text-white mb-1">
        إضافة <span class="text-[#D4AF37]">ماركة</span>
      </h1>
      <p class="text-white/30 text-sm">أضف ماركة جديدة للمتجر</p>
    </div>

    <div
      class="relative bg-white/3 border border-white/5 rounded-2xl p-8"
      style="
        box-shadow:
          0 0 60px rgba(212, 175, 55, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      "
    >
      <div
        class="absolute top-3 right-3 w-5 h-5 border-t-2 border-r-2 border-[#D4AF37]/25 rounded-tr-sm pointer-events-none"
      ></div>
      <div
        class="absolute top-3 left-3 w-5 h-5 border-t-2 border-l-2 border-[#D4AF37]/25 rounded-tl-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 right-3 w-5 h-5 border-b-2 border-r-2 border-[#D4AF37]/25 rounded-br-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 left-3 w-5 h-5 border-b-2 border-l-2 border-[#D4AF37]/25 rounded-bl-sm pointer-events-none"
      ></div>

      <div class="flex flex-col gap-6">
        <form [formGroup]="addBrandForm" (submit)="onSubmit()">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] text-[#D4AF37]/60 tracking-widest uppercase"
              >صورة الماركة</label
            >
            <div
              class="relative flex flex-col items-center justify-center gap-3 border-2 border-dashed border-white/10 rounded-2xl p-8 cursor-pointer hover:border-[#D4AF37]/40 transition-colors duration-200 group bg-white/2"
            >
              <div
                class="w-14 h-14 rounded-xl flex items-center justify-center"
                style="background: rgba(212, 175, 55, 0.1)"
              >
                <i
                  class="fa-solid fa-cloud-arrow-up text-[#D4AF37]/60 text-2xl group-hover:text-[#D4AF37] transition-colors duration-200"
                ></i>
              </div>
              <div class="text-center">
                <p class="text-white/50 text-sm font-semibold">اسحب الصورة هنا أو اضغط للاختيار</p>
                <p class="text-white/20 text-xs mt-1">PNG, JPG, SVG — حجم أقصى 2MB</p>
              </div>
              <input
                type="file"
                accept="image/*"
                (change)="selectImage($event)"
                class="absolute inset-0 opacity-0 cursor-pointer"
              />
            </div>
            @if (file()?.name) {
              <p class="text-white/50 text-sm font-semibold">
                {{ file()?.name }}
              </p>
            }
          </div>

          <div class="flex flex-col gap-1.5 mb-3.5">
            <label class="text-[10px] text-[#D4AF37]/60 tracking-widest uppercase"
              >اسم الماركة</label
            >
            <input
              type="text"
              formControlName="name"
              placeholder="مثال: Samsung"
              class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none focus:border-[#D4AF37]/50 transition-colors duration-200"
            />
          </div>

          <div class="h-px bg-gradient-to-r from-transparent via-[#D4AF37]/15 to-transparent"></div>

          <div class="flex gap-3 mt-3.5">
            <a
              routerLink="/dashboard/brands"
              class="flex-1 flex items-center justify-center py-3 rounded-xl text-sm font-semibold text-white/40 border border-white/8 hover:border-white/20 hover:text-white/60 transition-all duration-200 cursor-pointer bg-white/3"
            >
              إلغاء
            </a>
            <button
              type="submit"
              (click)="onSubmit()"
              [disabled]="addBrandForm.invalid || !file()"
              class="relative flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-sm overflow-hidden cursor-pointer group disabled:opacity-40 disabled:cursor-not-allowed"
              style="
                background: linear-gradient(135deg, #d4af37 0%, #f0cc5c 50%, #d4af37 100%);
                color: #0a0a0a;
              "
            >
              <span class="relative z-10 flex items-center gap-2">
                <i
                  class="fa-solid fa-plus transition-transform duration-200 group-hover:rotate-90"
                ></i>
                إضافة الماركة
              </span>
              <div
                class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
                style="background: linear-gradient(135deg, #f0cc5c 0%, #d4af37 100%)"
              ></div>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
