<div
  class="min-h-screen bg-[#0a0a0a] text-white font-['Tajawal',sans-serif] flex items-center justify-center py-16 px-4"
  dir="rtl"
>
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div
      class="absolute top-[-10%] right-[10%] w-[600px] h-[600px] rounded-full"
      style="background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, transparent 70%)"
    ></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-gradient-to-l from-[#82c04f]/30 to-transparent"></div>
      <span class="text-xs tracking-[0.3em] uppercase text-[#82c04f] opacity-60"
        >Mister Mobile Dashboard</span
      >
      <div class="flex-1 h-px bg-gradient-to-r from-[#82c04f]/30 to-transparent"></div>
    </div>

    <div class="mb-8">
      <h1 class="text-3xl font-black text-white mb-1">
        تعديل <span class="text-[#82c04f]">الكمية</span>
      </h1>
      <p class="text-white/30 text-sm">تحديث كمية المخزون للون المحدد</p>
    </div>

    <div
      class="relative bg-white/3 border border-white/5 rounded-2xl p-8"
      style="
        box-shadow:
          0 0 60px rgba(212, 175, 55, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      "
    >
      <div
        class="absolute top-3 right-3 w-5 h-5 border-t-2 border-r-2 border-[#82c04f]/25 rounded-tr-sm pointer-events-none"
      ></div>
      <div
        class="absolute top-3 left-3 w-5 h-5 border-t-2 border-l-2 border-[#82c04f]/25 rounded-tl-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 right-3 w-5 h-5 border-b-2 border-r-2 border-[#82c04f]/25 rounded-br-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 left-3 w-5 h-5 border-b-2 border-l-2 border-[#82c04f]/25 rounded-bl-sm pointer-events-none"
      ></div>

      <form [formGroup]="updateStockForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
        <div class="flex items-center gap-3 bg-white/3 border border-white/8 rounded-xl px-4 py-3">
          <div
            class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
            style="background: rgba(212, 175, 55, 0.1)"
          >
            <i class="fa-solid fa-palette text-[#82c04f] text-sm"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-white/40 text-[10px] tracking-widest uppercase mb-0.5">معرف اللون</p>
            <p class="text-white/60 text-xs font-mono truncate">{{ colorId }}</p>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] text-[#82c04f]/60 tracking-widest uppercase"
            >الكمية الجديدة</label
          >

          <div class="flex gap-2 mb-2">
            @for (qty of [5, 10, 20, 50]; track qty) {
              <button
                type="button"
                (click)="updateStockForm.get('stock_quantity')?.setValue(qty)"
                class="flex-1 py-1.5 rounded-lg text-xs font-semibold border border-white/10 text-white/30 hover:border-[#82c04f]/40 hover:text-[#82c04f] transition-all duration-200 cursor-pointer bg-white/3"
              >
                {{ qty }}
              </button>
            }
          </div>

          <div class="relative">
            <input
              type="number"
              formControlName="stock_quantity"
              placeholder="أدخل الكمية"
              min="0"
              class="w-full bg-white/5 border rounded-xl px-4 py-3 text-sm text-white placeholder-white/20 outline-none transition-colors duration-200 pl-10"
              [ngClass]="
                updateStockForm.get('stock_quantity')?.invalid &&
                updateStockForm.get('stock_quantity')?.touched
                  ? 'border-red-500/50 focus:border-red-500/70'
                  : 'border-white/10 focus:border-[#82c04f]/50'
              "
            />
            <i
              class="fa-solid fa-box absolute left-3 top-1/2 -translate-y-1/2 text-white/20 text-xs pointer-events-none"
            ></i>
          </div>

          @if (
            updateStockForm.get('stock_quantity')?.invalid &&
            updateStockForm.get('stock_quantity')?.touched
          ) {
            <p class="text-red-400 text-xs flex items-center gap-1">
              <i class="fa-solid fa-circle-exclamation text-xs"></i>
              الكمية مطلوبة
            </p>
          }
        </div>

        <div class="h-px bg-gradient-to-r from-transparent via-[#82c04f]/15 to-transparent"></div>

        <div class="flex gap-3">
          <a
            routerLink="/dashboard/mobiles/colors"
            class="flex-1 flex items-center justify-center py-3 rounded-xl text-sm font-semibold text-white/40 border border-white/8 hover:border-white/20 hover:text-white/60 transition-all duration-200 cursor-pointer bg-white/3"
          >
            إلغاء
          </a>
          <button
            type="submit"
            [disabled]="updateStockForm.invalid"
            class="relative flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-sm overflow-hidden cursor-pointer group disabled:opacity-40 disabled:cursor-not-allowed"
            style="
              background: linear-gradient(135deg, #82c04f 0%, #8ed256 50%, #82c04f 100%);
              color: #0a0a0a;
            "
          >
            <span class="relative z-10 flex items-center gap-2">
              <i
                class="fa-solid fa-floppy-disk transition-transform duration-200 group-hover:scale-110"
              ></i>
              حفظ الكمية
            </span>
            <div
              class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
              style="background: linear-gradient(135deg, #8ed256 0%, #82c04f 100%)"
            ></div>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
