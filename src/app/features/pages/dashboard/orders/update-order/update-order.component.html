<div
  class="min-h-screen bg-[#0a0a0a] text-white font-['Tajawal',sans-serif] flex items-center justify-center py-16 px-4"
  dir="rtl"
>
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div
      class="absolute top-[-10%] right-[10%] w-[600px] h-[600px] rounded-full"
      style="background: radial-gradient(circle, rgba(212, 175, 55, 0.07) 0%, transparent 70%)"
    ></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-gradient-to-l from-[#D4AF37]/30 to-transparent"></div>
      <span class="text-xs tracking-[0.3em] uppercase text-[#D4AF37] opacity-60"
        >LUXA Dashboard</span
      >
      <div class="flex-1 h-px bg-gradient-to-r from-[#D4AF37]/30 to-transparent"></div>
    </div>

    <div class="mb-8">
      <h1 class="text-3xl font-black text-white mb-1">
        تعديل <span class="text-[#D4AF37]">حالة الطلب</span>
      </h1>
      <p class="text-white/30 text-sm">تحديث حالة الدفع للطلب المحدد</p>
    </div>

    <div
      class="relative bg-white/3 border border-white/5 rounded-2xl p-8"
      style="
        box-shadow:
          0 0 60px rgba(212, 175, 55, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      "
    >
      <div
        class="absolute top-3 right-3 w-5 h-5 border-t-2 border-r-2 border-[#D4AF37]/25 rounded-tr-sm pointer-events-none"
      ></div>
      <div
        class="absolute top-3 left-3 w-5 h-5 border-t-2 border-l-2 border-[#D4AF37]/25 rounded-tl-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 right-3 w-5 h-5 border-b-2 border-r-2 border-[#D4AF37]/25 rounded-br-sm pointer-events-none"
      ></div>
      <div
        class="absolute bottom-3 left-3 w-5 h-5 border-b-2 border-l-2 border-[#D4AF37]/25 rounded-bl-sm pointer-events-none"
      ></div>

      <form [formGroup]="updateOrderStatus" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
        <div class="flex items-center gap-3 bg-white/3 border border-white/8 rounded-xl px-4 py-3">
          <div
            class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0"
            style="background: rgba(212, 175, 55, 0.1)"
          >
            <i class="fa-solid fa-box text-[#D4AF37] text-sm"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-white/40 text-[10px] tracking-widest uppercase mb-0.5">رقم الطلب</p>
            <p class="text-white/60 text-xs font-mono truncate">{{ orderId }}</p>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-[10px] text-[#D4AF37]/60 tracking-widest uppercase"
            >الحالة الجديدة</label
          >

          <div class="grid grid-cols-2 gap-3">
            <label
              class="relative flex flex-col items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all duration-200"
              [ngClass]="
                updateOrderStatus.get('payment_status')?.value === 'confirmed'
                  ? 'border-green-500/60 bg-green-500/8'
                  : 'border-white/8 bg-white/2 hover:border-white/15'
              "
            >
              <input
                type="radio"
                formControlName="payment_status"
                value="confirmed"
                class="sr-only"
              />
              <div
                class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-200"
                [ngClass]="
                  updateOrderStatus.get('payment_status')?.value === 'confirmed'
                    ? 'bg-green-500/20'
                    : 'bg-white/5'
                "
              >
                <i
                  class="fa-solid fa-circle-check text-xl"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'confirmed'
                      ? 'text-green-400'
                      : 'text-white/20'
                  "
                >
                </i>
              </div>
              <div class="text-center">
                <p
                  class="font-bold text-sm"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'confirmed'
                      ? 'text-green-400'
                      : 'text-white/40'
                  "
                >
                  تأكيد
                </p>
                <p
                  class="text-[10px] mt-0.5"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'confirmed'
                      ? 'text-green-400/60'
                      : 'text-white/20'
                  "
                >
                  confirmed
                </p>
              </div>
              @if (updateOrderStatus.get('payment_status')?.value === 'confirmed') {
                <div
                  class="absolute top-2 left-2 w-4 h-4 rounded-full bg-green-500/20 flex items-center justify-center"
                >
                  <i class="fa-solid fa-check text-green-400 text-[8px]"></i>
                </div>
              }
            </label>

            <label
              class="relative flex flex-col items-center gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all duration-200"
              [ngClass]="
                updateOrderStatus.get('payment_status')?.value === 'rejected'
                  ? 'border-red-500/60 bg-red-500/8'
                  : 'border-white/8 bg-white/2 hover:border-white/15'
              "
            >
              <input
                type="radio"
                formControlName="payment_status"
                value="rejected"
                class="sr-only"
              />
              <div
                class="w-12 h-12 rounded-xl flex items-center justify-center transition-all duration-200"
                [ngClass]="
                  updateOrderStatus.get('payment_status')?.value === 'rejected'
                    ? 'bg-red-500/20'
                    : 'bg-white/5'
                "
              >
                <i
                  class="fa-solid fa-circle-xmark text-xl"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'rejected'
                      ? 'text-red-400'
                      : 'text-white/20'
                  "
                >
                </i>
              </div>
              <div class="text-center">
                <p
                  class="font-bold text-sm"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'rejected'
                      ? 'text-red-400'
                      : 'text-white/40'
                  "
                >
                  رفض
                </p>
                <p
                  class="text-[10px] mt-0.5"
                  [ngClass]="
                    updateOrderStatus.get('payment_status')?.value === 'rejected'
                      ? 'text-red-400/60'
                      : 'text-white/20'
                  "
                >
                  rejected
                </p>
              </div>
              @if (updateOrderStatus.get('payment_status')?.value === 'rejected') {
                <div
                  class="absolute top-2 left-2 w-4 h-4 rounded-full bg-red-500/20 flex items-center justify-center"
                >
                  <i class="fa-solid fa-check text-red-400 text-[8px]"></i>
                </div>
              }
            </label>
          </div>

          @if (
            updateOrderStatus.get('payment_status')?.invalid &&
            updateOrderStatus.get('payment_status')?.touched
          ) {
            <p class="text-red-400 text-xs flex items-center gap-1">
              <i class="fa-solid fa-circle-exclamation text-xs"></i>
              يرجى اختيار الحالة
            </p>
          }
        </div>

        <div class="h-px bg-gradient-to-r from-transparent via-[#D4AF37]/15 to-transparent"></div>

        <div class="flex gap-3">
          <a
            routerLink="/dashboard/orders"
            class="flex-1 flex items-center justify-center py-3 rounded-xl text-sm font-semibold text-white/40 border border-white/8 hover:border-white/20 hover:text-white/60 transition-all duration-200 cursor-pointer bg-white/3"
          >
            إلغاء
          </a>
          <button
            type="submit"
            [disabled]="updateOrderStatus.invalid"
            class="relative flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-sm overflow-hidden cursor-pointer group disabled:opacity-40 disabled:cursor-not-allowed"
            style="
              background: linear-gradient(135deg, #d4af37 0%, #f0cc5c 50%, #d4af37 100%);
              color: #0a0a0a;
            "
          >
            <span class="relative z-10 flex items-center gap-2">
              <i
                class="fa-solid fa-floppy-disk transition-transform duration-200 group-hover:scale-110"
              ></i>
              حفظ الحالة
            </span>
            <div
              class="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
              style="background: linear-gradient(135deg, #f0cc5c 0%, #d4af37 100%)"
            ></div>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
